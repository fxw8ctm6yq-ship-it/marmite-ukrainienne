backend:
     name: git-gateway
     branch: main

   media_folder: "images"
   public_folder: "/images"

   collections:
     - name: "actualites"
       label: "Actualités"
       folder: "_actualites"
       create: true
       delete: true
       fields:
         - { label: "Titre", name: "title", widget: "string" }
         - { label: "Type", name: "type", widget: "select", options: ["Événement", "Fermeture", "Promotion", "Info"] }
         - { label: "Date", name: "date", widget: "string" }
         - { label: "Description", name: "body", widget: "text" }

     - name: "photos"
       label: "Galerie Photos"
       folder: "_photos"
       create: true
       delete: true
       fields:
         - { label: "Titre", name: "title", widget: "string" }
         - { label: "Photo", name: "image", widget: "image" }
         - { label: "Catégorie", name: "categorie", widget: "string" }
